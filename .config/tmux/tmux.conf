# Change prefix from Ctrl+b to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Split panes with more intuitive keys
# | for vertical split, - for horizontal split
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# Switch panes with prefix + arrow keys
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Switch panes WITHOUT prefix using Alt+arrow
# This is super convenient, no prefix needed at all
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse support
# Lets you click to switch panes and resize them by dragging
set -g mouse on

# Better colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1 instead of 0
# Just more intuitive when switching with number keys
set -g base-index 1
set -g pane-base-index 1

# Resize panes with prefix + Shift + arrow keys
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5

# Kanagawa Dragon theme
set -g status-style bg=#0d0d0d,fg=#c5c9c5
set -g window-status-style fg=#4a4a4a
set -g window-status-current-style bg=#1a1a1a,fg=#e2d9b3,bold
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style fg=#2a2a2a
set -g pane-active-border-style fg=#e2d9b3
set -g status-left "#[fg=#e2d9b3,bold] #S "
set -g status-right "#[fg=#8a9a7b] %H:%M #[fg=#e2d9b3]%d/%m/%Y "
set -g message-style bg=#1a1a1a,fg=#e2d9b3
